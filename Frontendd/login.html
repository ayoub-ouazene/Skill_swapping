<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Connexion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="signup-body"> <main class="login-container">
        <header class="login-header">
            <div class="back-arrow"><i class="fa-solid fa-arrow-left"></i></div>
            <div class="profile-icon-wrapper">
                <div class="main-circle">
                    <i class="fa-solid fa-user"></i>
                    <div class="lock-badge"><i class="fa-solid fa-lock"></i></div>
                </div>
            </div>
            <h1>Welcome Back!</h1>
        </header>

        <form class="login-form">
            <div class="input-field-wrapper">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <input id="login-email" type="text" inputmode="email" autocomplete="username" placeholder="name@gmail.com ou alice.demo@skillswap.test" required>
                    <i class="fa-regular fa-envelope"></i>
                </div>
            </div>

            <div class="input-field-wrapper">
                <div class="label-row">
                    <label>Password</label>
                </div>
                <div class="input-with-icon">
                    <input id="login-password" type="password" autocomplete="current-password" placeholder="........" required>
                    <i class="fa-regular fa-eye-slash"></i>
                </div>
            </div>

            <button type="submit" class="signin-btn">
                Sign In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
        <p class="login-redirect">
           Dont have account? <a href="signup.html">Sign in</a>
        </p>

    </main>
<script src="api-config.js"></script>
<script>
    const loginForm = document.querySelector('.login-form');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Récupération des inputs (attention, vérifie bien que tes inputs ont ces types)
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
            // Appel à la route de login
            const apiBase = typeof window.SKILLSWAP_API_BASE === 'string' ? window.SKILLSWAP_API_BASE : 'http://127.0.0.1:8000';
            const response = await fetch(apiBase + '/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            let data = {};
            try {
                data = await response.json();
            } catch (_) {}

            if (response.ok) {
                
                localStorage.setItem('skillswap_token', data.access_token);
                
                alert("Connexion réussie !");
                
                window.location.href = 'home.html'; 
            } else {
                let msg = "Email ou mot de passe incorrect";
                if (Array.isArray(data.detail)) {
                    msg = data.detail.map(function (d) { return d.msg || JSON.stringify(d); }).join(" ");
                } else if (typeof data.detail === "string") {
                    msg = data.detail;
                }
                alert("Erreur : " + msg);
            }
        } catch (error) {
            console.error("Erreur :", error);
            alert("Impossible de contacter le serveur.");
        }
    });
</script> 
</body>
</html>
