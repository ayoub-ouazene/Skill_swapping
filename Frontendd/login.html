<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Connexion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="signup-body"> <main class="login-container">
        <header class="login-header">
            <div class="back-arrow"><i class="fa-solid fa-arrow-left"></i></div>
            <div class="profile-icon-wrapper">
                <div class="main-circle">
                    <i class="fa-solid fa-user"></i>
                    <div class="lock-badge"><i class="fa-solid fa-lock"></i></div>
                </div>
            </div>
            <h1>Welcome Back!</h1>
            <p>Login to access your expert dashboard and personalized insights.</p>
        </header>

        <form class="login-form" id="login-form">
            <p id="login-error" class="form-error-msg" hidden></p>
            <div class="input-field-wrapper">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <input id="login-email" type="email" name="email" placeholder="name@gmail.com" autocomplete="email" required>
                    <i class="fa-regular fa-envelope"></i>
                </div>
            </div>

            <div class="input-field-wrapper">
                <div class="label-row">
                    <label>Password</label>
                </div>
                <div class="input-with-icon">
                    <input id="login-password" type="password" name="password" placeholder="........" autocomplete="current-password" required>
                    <i class="fa-regular fa-eye-slash"></i>
                </div>
            </div>

            <button type="submit" class="signin-btn">
                Sign In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
        <p class="login-redirect">
           Don't have an account? <a href="signup.html">Sign up</a>
        </p>

    </main>

    <script src="api-config.js"></script>
    <script src="auth-login.js"></script>
</body>
</html>
