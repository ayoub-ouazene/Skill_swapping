<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — Learnest</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .messages-page h1 { margin-bottom: 20px; color: #0f172a; }

        .peer-new-chat {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
        }
        .peer-new-chat label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }
        .peer-new-chat-row {
            display: flex;
            align-items: stretch;
            gap: 10px;
        }
        .peer-id-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: #64748b;
            flex-shrink: 0;
        }
        .peer-new-chat-row input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
        }
        .peer-new-chat-row input:focus {
            outline: none;
            border-color: #0d827c;
            box-shadow: 0 0 0 3px rgba(13, 130, 124, 0.15);
        }
        .peer-start-primary {
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            background: #0d827c;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .peer-start-primary:hover { background: #0a6d67; }

        .peer-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 0;
            min-height: 68vh;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
        }
        .peer-thread-list {
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            max-height: 72vh;
            background: #fafafa;
        }
        .peer-thread-item {
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.12s;
        }
        .peer-thread-item:hover,
        .peer-thread-item.active {
            background: #fff;
        }
        .peer-thread-item.active {
            box-shadow: inset 3px 0 0 #0d827c;
        }
        .peer-thread-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .peer-thread-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(145deg, #99f6e4, #5eead4);
            color: #0f766e;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .peer-thread-name {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .peer-thread-name .peer-fn,
        .peer-thread-name .peer-ln {
            font-size: 15px;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .peer-thread-name .peer-ln { font-weight: 500; color: #475569; }

        .peer-chat-panel {
            display: flex;
            flex-direction: column;
            max-height: 72vh;
            background: #fff;
        }
        .peer-chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            min-height: 56px;
            display: flex;
            align-items: center;
        }
        .peer-chat-title-placeholder { color: #94a3b8; font-weight: 500; font-size: 15px; }
        .peer-chat-title-handle {
            font-size: 18px;
            font-weight: 700;
            color: #0d827c;
            text-decoration: none;
        }
        .peer-chat-title-handle:hover { text-decoration: underline; text-underline-offset: 3px; }

        .peer-msgs {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .peer-bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.4;
            font-size: 14px;
        }
        .peer-bubble.me {
            align-self: flex-end;
            background: #0d827c;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .peer-bubble.them {
            align-self: flex-start;
            background: #e2e8f0;
            color: #0f172a;
            border-bottom-left-radius: 4px;
        }
        .peer-compose {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e2e8f0;
            background: #fff;
        }
        .peer-compose input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
        }
        .peer-compose button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #0d827c;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .peer-compose button:disabled { opacity: 0.5; cursor: not-allowed; }
        #peer-error {
            color: #b91c1c;
            font-size: 14px;
            margin: 0 0 12px 0;
        }
    </style>
</head>
<body>
    <script src="auth-guard.js"></script>
    <div class="app-container">
        <aside class="sidebar">
            <nav class="side-nav">
                <a href="profile.html" class="nav-item"><i class="fas fa-calendar-alt"></i> profil</a>
                <a href="home.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
                <a href="messages.html" class="nav-item active"><i class="fas fa-comments"></i> Messages</a>
                <a href="chatbot.html" class="nav-item"><i class="fas fa-bolt"></i> AI Match</a>
                <a href="index.html" class="nav-item"><i class="fas fa-sign-out-alt"></i> Deconnexion</a>
            </nav>
        </aside>

        <main class="main-content gradient-bg messages-page">
            <header class="top-nav">
                <div class="logo">Learnest</div>
                <nav class="center-nav"></nav>
                <div class="right-nav"></div>
            </header>

            <div class="container container-large">
                <h1>Messages</h1>

                <div class="peer-new-chat">
                    <label for="start-peer-id">Nouvelle conversation</label>
                    <div class="peer-new-chat-row">
                        <span class="peer-id-icon" aria-hidden="true"><i class="fas fa-fingerprint"></i></span>
                        <input type="text" id="start-peer-id" placeholder="ID ou pseudo (ex. alicemartin_89d7308f)" autocomplete="off" spellcheck="false">
                        <button type="button" class="peer-start-primary" id="btn-start-chat">Démarrer</button>
                    </div>
                </div>
                <p id="peer-error" hidden></p>

                <div class="peer-layout">
                    <div class="peer-thread-list" id="thread-list"></div>
                    <div class="peer-chat-panel">
                        <div class="peer-chat-header" id="chat-title">
                            <span class="peer-chat-title-placeholder">Sélectionnez une conversation</span>
                        </div>
                        <div class="peer-msgs" id="msg-area"></div>
                        <div class="peer-compose">
                            <input type="text" id="msg-input" placeholder="Votre message…" disabled>
                            <button type="button" id="btn-send" disabled>Envoyer</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="peer-messages.js"></script>
</body>
</html>
