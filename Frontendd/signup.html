<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnest - Inscription</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="signup-body">

    <main class="signup-container">
        
        <h1 class="signup-title">Sign up</h1>

        <form action="#" method="POST" class="signup-form">
            
            <div class="input-group full-width">
                <input type="email" id="email" name="email" placeholder="E-mail" required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <input type="text" id="firstName" name="firstName" placeholder="First name" required>
                </div>
                <div class="input-group">
                    <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm" required>
                </div>
            </div>

          <button type="submit" class="signup-submit-btn">Sign up</button>

        </form>

        <p class="login-redirect">
            Already have an account? <a href="login.html">Sign in</a>
        </p>

    </main>

<script>
    const signupForm = document.querySelector('.signup-form');

    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const email = document.getElementById('email').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            alert("Les mots de passe ne correspondent pas !");
            return;
        }

        try {
            const response = await fetch('http://127.0.0.1:8000/auth/register', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    first_name: firstName,
                    last_name: lastName,  
                    full_name: `${firstName} ${lastName}`
                })
            });

            const result = await response.json();

            if (response.ok) {
                // SCENARIO 1: The backend returns a token immediately upon registration
                if (result.access_token) {
                    // Store the token securely in the browser
                    localStorage.setItem('skillswap_token', result.access_token);
                    
                    alert("Succès ! Compte créé et connecté pour " + firstName);
                    // Redirect directly to the main app since we already have the token
                    window.location.href = "home.html"; 
                } 
                // SCENARIO 2: The backend only creates the account, no token returned yet
                else {
                    alert("Succès ! Compte créé pour " + firstName + ". Veuillez vous connecter.");
                    // Redirect to login page to get the token
                    window.location.href = "login.html";
                }
            } else {
                // Error handling
                let detailedError = "";
                if (Array.isArray(result.detail)) {
                    detailedError = result.detail.map(d => `${d.loc[1]}: ${d.msg}`).join("\n");
                } else {
                    detailedError = result.detail || "Erreur inconnue";
                }
                alert("Erreur validation :\n" + detailedError);
            }
        } catch (error) {
            console.error("Erreur réseau:", error);
            alert("Le serveur ne répond pas. Vérifie qu'Ayoub a lancé uvicorn.");
        }
    });
</script>
</body>
</html>
